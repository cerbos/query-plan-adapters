name: SQLAlchemy Pull Request

# No branch filter: like the other adapter workflows, tests must also run on PRs
# targeting non-main bases (e.g. stacked PRs).
on:
  pull_request:
    paths:
      - "sqlalchemy/**"
      - "policies/**"
      - ".github/workflows/sqlalchemy_pr.yaml"
      - ".github/workflows/sqlalchemy_release.yaml"

defaults:
  run:
    working-directory: sqlalchemy

jobs:
  test-sqla:
    name: SQLA test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ./__pypackages__
          key: ${{ runner.os }}-python-${{ hashFiles('**/pdm.lock') }}

      - uses: pdm-project/setup-pdm@973541a5febeafcfdadf8a51211435be6ecfd90f # v4.5
        name: Setup PDM
        with:
          python-version: "3.10" # Version range or exact version of a Python version to use, the same as actions/setup-python
          prerelease: true # Allow prerelease versions to be installed
          enable-pep582: true # Enable PEP 582 package loading globally

      - run: pdm install -G testcontainers

      - run: pdm run test
