name: ChromaDB Test

on:
  pull_request:
    paths:
      - "langchain-chromadb/**"
      - "policies/**"
      - ".github/workflows/chromadb.yaml"
      - ".github/workflows/chromadb-publish.yaml"
  push:
    tags:
      - langchain-chromadb/v*

defaults:
  run:
    working-directory: langchain-chromadb

jobs:
  test:
    strategy:
      matrix:
        cerbos-version: ["latest"]
        node-version: ["20", "22", "24", "25"]
        chroma-image: ["ghcr.io/chroma-core/chroma:latest"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Cerbos
        uses: cerbos/cerbos-setup-action@f8061b1f07da2d185acd233dedaa5d5eadb99214 # v1
        with:
          version: ${{ matrix.cerbos-version }}

      - name: Start ChromaDB
        run: |
          docker run -d --name chromadb -p 8000:8000 ${{ matrix.chroma-image }}
          for _ in {1..30}; do
            if curl -sf http://127.0.0.1:8000/api/v2/heartbeat > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "ChromaDB failed to start" >&2
          exit 1

      - name: Test using Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run test:cerbos
        env:
          CHROMA_URL: http://127.0.0.1:8000
