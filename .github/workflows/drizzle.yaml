name: Drizzle Test

on:
  pull_request:
    paths:
      - "drizzle/**"
      - "policies/**"
      - ".github/workflows/drizzle.yaml"
      - ".github/workflows/drizzle-publish.yaml"
  push:
    tags:
      - drizzle/v*

defaults:
  run:
    working-directory: drizzle

jobs:
  test:
    strategy:
      matrix:
        cerbos-version: ["latest"]
        node-version: ["20", "22", "24", "25"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Cerbos
        uses: cerbos/cerbos-setup-action@6d88cfd96db5af84489633c6a2db42bf2522933b # v1
        with:
          version: ${{ matrix.cerbos-version }}

      - name: Test using Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run test
