name: Prisma Test

on:
  pull_request:
    paths:
      - "prisma/**"
      - "policies/**"
      - ".github/workflows/prisma.yaml"
      - ".github/workflows/prisma-publish.yaml"
  push:
    tags:
      - prisma/v*

defaults:
  run:
    working-directory: prisma

jobs:
  test:
    strategy:
      matrix:
        cerbos-version: ["latest"]
        node-version: ["20", "22", "24", "25"]
        prisma-version: ["6", "7"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Cerbos
        uses: cerbos/cerbos-setup-action@f772482c8504a05c49018a0bf2d84012a607733c # v1
        with:
          version: ${{ matrix.cerbos-version }}

      - name: Test using Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - name: Generate Prisma clients
        run: npm run prisma:generate

      - name: Run tests
        run: npm run test:v${{ matrix.prisma-version }}
