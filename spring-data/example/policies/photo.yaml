# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json
#
# Photo-sharing example policy. The cerbos-spring-data adapter translates
# the PDP's query-plan response into a JPA Specification<Photo> at runtime,
# so each rule below corresponds to one or more JPA Criteria predicates.
#
#   view    : public + not archived OR ownerId == self
#   edit    : ownerId == self
#   delete  : ownerId == self
#   comment : public + not archived, OR "friends" tag set, OR ownerId == self
#   discover         : numeric comparison on a scalar and an embedded field
#   located          : nullable-field isSet/null semantics
#   similar          : intersection with a principal list attribute
#   needs-moderation : exists() over structured label entities
#   fully-reviewed   : all() over labels, including the empty-set case
#   unlabelled       : size() over a relation
#   exactly-one-reviewed: exists_one() over a relation
#   percent/underscore-title: literal SQL LIKE metacharacter escaping
#   admin            : unconditional ALLOW on all actions
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: photo
  version: default
  rules:
    - actions: ["view"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          any:
            of:
              - all:
                  of:
                    - expr: request.resource.attr.public == true
                    - expr: request.resource.attr.archived == false
              - expr: request.resource.attr.ownerId == request.principal.id

    - actions: ["edit", "delete"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.ownerId == request.principal.id

    - actions: ["comment"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          any:
            of:
              - all:
                  of:
                    - expr: request.resource.attr.public == true
                    - expr: request.resource.attr.archived == false
              - expr: '"friends" in request.resource.attr.tags'
              - expr: request.resource.attr.ownerId == request.principal.id

    - actions: ["discover"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          all:
            of:
              - expr: request.resource.attr.rating >= 4
              - expr: request.resource.attr.metadata.width >= 3000

    - actions: ["located"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.location != null

    - actions: ["similar"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: hasIntersection(request.resource.attr.tags, request.principal.attr.interests)

    - actions: ["needs-moderation"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: >
            request.resource.attr.labels.exists(label,
              label.name == "safety" && label.confidence >= 0.8)

    - actions: ["fully-reviewed"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.labels.all(label, label.reviewed == true)

    - actions: ["unlabelled"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: size(request.resource.attr.labels) == 0

    - actions: ["exactly-one-reviewed"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.labels.exists_one(label, label.reviewed == true)

    - actions: ["percent-title"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: 'request.resource.attr.title.contains("%")'

    - actions: ["underscore-title"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: 'request.resource.attr.title.contains("_")'

    # Enterprise delegated access: the local JPA tenant Specification is the mandatory outer
    # boundary; these policy checks add defense in depth and validate each grant against its
    # owning photo so a malformed cross-tenant grant cannot authorize.
    - actions: ["delegated-view"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: >
            request.resource.attr.tenantId == request.principal.attr.tenantId &&
            request.resource.attr.grants.exists(grant,
              grant.tenantId == request.resource.attr.tenantId &&
              grant.permission == "view" &&
              (grant.userId == request.principal.id ||
               grant.groupId in request.principal.attr.groups))

    # These three actions deliberately distinguish CEL UNKNOWN from false for nullable child
    # fields. A null-only grant is excluded under both the positive and unguarded negated forms.
    - actions: ["group-grant"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: >
            request.resource.attr.tenantId == request.principal.attr.tenantId &&
            request.resource.attr.grants.exists(grant,
              grant.groupId in request.principal.attr.groups)

    - actions: ["no-group-grant"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: >
            request.resource.attr.tenantId == request.principal.attr.tenantId &&
            !request.resource.attr.grants.exists(grant,
              grant.groupId in request.principal.attr.groups)

    - actions: ["no-group-grant-safe"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: >
            request.resource.attr.tenantId == request.principal.attr.tenantId &&
            !request.resource.attr.grants.exists(grant,
              grant.groupId != null &&
              grant.groupId in request.principal.attr.groups)

    - actions:
        - "view"
        - "edit"
        - "delete"
        - "comment"
        - "discover"
        - "located"
        - "similar"
        - "needs-moderation"
        - "fully-reviewed"
        - "unlabelled"
        - "exactly-one-reviewed"
        - "percent-title"
        - "underscore-title"
        - "delegated-view"
        - "group-grant"
        - "no-group-grant"
        - "no-group-grant-safe"
      effect: EFFECT_ALLOW
      roles: ["admin"]

    # ------------------------------------------------------------------------
    # Edge-case regression scenarios
    #
    # Each `edge-*` action below pins one historical adapter bug at the
    # full-stack level (Spring Boot app + live PDP + real repository). They are
    # exercised only by the dedicated "edge"-tenant fixtures in SeedData.java
    # and asserted by scripts/smoke-edge-cases.sh — see "Edge-case regression
    # scenarios" in the example README. Some expressions are deliberately
    # pathological (labeled inline); they are probes, not policy-writing
    # recommendations.
    # ------------------------------------------------------------------------

    # Pins PR #274: eq over (field + constant) used an algebraic solve
    # (0.1 - 0.7 = -0.6) that IEEE addition does not invert. check() denies
    # score = -0.6 (-0.6 + 0.7 == 0.09999999999999998, not 0.1) but the old
    # adapter emitted `WHERE score = -0.6` and INCLUDED that row. No double
    # satisfies this equation, so the correct result set is empty.
    - actions: ["edge-ieee-eq"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.score + 0.7 == 0.1

    # Pins PR #274 (ne direction): the old solve emitted `WHERE score != -0.6`,
    # wrongly EXCLUDING the score = -0.6 row that check() allows here.
    - actions: ["edge-ieee-ne"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.score + 0.7 != 0.1

    # Pins PR #275: ordering against a constant NaN used Double.compare (a
    # total order ranking NaN above every number), so the NaN else-arm of this
    # ternary collapsed to always-true and non-public rows leaked through.
    # CEL/IEEE define every NaN ordering as false. 0.0/0.0 is a deliberate
    # NaN-producing probe.
    - actions: ["edge-nan-ordering"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: '(request.resource.attr.public ? 1.0 : 0.0 / 0.0) > 0.5'

    # Pins PR #279: the most common compliance shape — a retention/time-window
    # rule. The planner folds `now() - duration(...)` to a constant instant;
    # before the fix the adapter threw for every query of this action (each
    # request was a 500 instead of returning the older-than-24h rows).
    - actions: ["edge-retention"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: timestamp(request.resource.attr.createdAt) < now() - duration("24h")

    # Pins PR #285: LIKE escaping must cover SQL Server's `[...]` character
    # class. The escaped pattern must keep matching a literal "[SEC]" prefix
    # (and never match the "Secret..." trap row, whose first character is in
    # the class {S,E,C}).
    - actions: ["edge-bracket-title"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: request.resource.attr.title.startsWith("[SEC]")

    # Pins PR #286: size() thresholds >= 2^31 were truncated by an (int) cast —
    # 4294967296 wrapped to 0 and `LENGTH(title) > 0` returned every non-empty
    # title. check() denies every row, so the correct result set is empty.
    # 4294967296 is a deliberately pathological regression probe.
    - actions: ["edge-size-huge"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: size(request.resource.attr.title) > 4294967296
