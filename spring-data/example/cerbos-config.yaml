server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"

storage:
  driver: "disk"
  disk:
    directory: /policies
    watchForChanges: true

telemetry:
  disabled: true

schema:
  enforcement: reject

# Stream decision/audit logs to stdout — `docker compose logs cerbos` then shows every
# PlanResources call the Spring Boot app made, so you can see what filter the adapter
# turned each plan into.
audit:
  enabled: true
  accessLogsEnabled: true
  decisionLogsEnabled: true
  backend: file
  file:
    path: stdout
