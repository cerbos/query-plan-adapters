# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: resource
  rules:
    - actions:
        - "always-allow"
      effect: EFFECT_ALLOW
      roles:
        - USER

    - actions:
        - "always-deny"
      effect: EFFECT_DENY
      roles:
        - USER

    - actions:
        - "equal"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aBool == true

    - actions:
        - "equal-oid"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.id == "507f1f77bcf86cd799439011"

    - actions:
        - "explicit-deny"
      effect: EFFECT_DENY
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aBool == true

    - actions:
        - "explicit-deny"
      effect: EFFECT_ALLOW
      roles:
        - USER

    - actions:
        - "bare-bool"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aBool

    - actions:
        - "bare-bool-negated"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "!request.resource.attr.aBool"

    - actions:
        - "bare-bool-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aBool

    - actions:
        - "bare-bool-nested-negated"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "!request.resource.attr.nested.aBool"

    - actions:
        - "ne"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString != "string"

    - actions:
        - "and"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          all:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: request.resource.attr.aString != "string"

    - actions:
        - "or"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: request.resource.attr.aString != "string"

    - actions:
        - "nand"
      effect: EFFECT_DENY
      roles:
        - USER
      condition:
        match:
          all:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: request.resource.attr.aString != "string"

    - actions:
        - "nand"
      effect: EFFECT_ALLOW
      roles:
        - USER

    - actions:
        - "nor"
      effect: EFFECT_DENY
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: request.resource.attr.aString != "string"

    - actions:
        - "nor"
      effect: EFFECT_ALLOW
      roles:
        - USER

    - actions:
        - "in"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString in ["string", "anotherString"]

    - actions:
        - "gt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber > 1

    - actions:
        - "lt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber < 2

    - actions:
        - "gte"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber >= 1

    - actions:
        - "lte"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber <= 2

    - actions:
        - "relation-some"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: P.id in request.resource.attr.ownedBy

    - actions:
        - "relation-none"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(P.id in request.resource.attr.ownedBy)

    - actions:
        - "relation-is"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.createdBy == P.id

    - actions:
        - "relation-is-not"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.createdBy == P.id)

    - actions:
        - "equal-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aBool == true

    - actions:
        - "equal-deeply-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.nextlevel.aBool == true

    - actions:
        - "relation-eq-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aNumber == 1

    - actions:
        - "relation-lt-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aNumber < 2

    - actions:
        - "relation-lte-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aNumber <= 2

    - actions:
        - "relation-gte-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aNumber >= 1

    - actions:
        - "has-tag"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            "public" in request.resource.attr.tags

    - actions:
        - "has-no-tag"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !("private" in request.resource.attr.tags)

    - actions:
        - "relation-gt-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aNumber > 1

    - actions:
        - "relation-multiple-all"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          all:
            of:
              - expr: request.resource.attr.nested.aNumber > 1
              - expr: request.resource.attr.nested.aNumber < 3

    - actions:
        - "relation-multiple-or"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: request.resource.attr.createdBy == P.id
              - expr: P.id in request.resource.attr.ownedBy

    - actions:
        - "relation-multiple-none"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          none:
            of:
              - expr: request.resource.attr.createdBy == P.id
              - expr: >
                  "public" in request.resource.attr.tags

    - actions:
        - "contains"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString.contains("str")

    - actions:
        - "starts-with"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString.startsWith("str")

    - actions:
        - "ends-with"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString.endsWith("ing")

    - actions:
        - "is-set"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aOptionalString != null

    - actions:
        - "has-intersection"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(request.resource.attr.tags.map(t, t.name), request.principal.attr.tags)

    - actions:
        - "has-intersection-direct"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(request.resource.attr.tags, ["public", "draft"])

    - actions:
        - "exists-single"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.exists(tag, tag.id == "tag1")

    - actions:
        - "exists-multiple"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.exists(tag, tag.id == "tag1" && tag.name == "public")

    - actions:
        - "exists"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.exists(tag, tag.name == "public")

    - actions:
        - "exists-one"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.exists_one(tag, tag.name == "public")

    - actions:
        - "all"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.all(tag, tag.name == "public")

    # Principal-collection macros: P.attr.* is always folded to a known value at plan
    # time, so the planner unrolls these to or/and chains when the collection has <= 10
    # elements (cerbos/cerbos#2570 exists, since 0.45; cerbos/cerbos#2817 all, since
    # 0.54) and emits the lambda with a literal value-list collection when it has more.
    # Adapter tests exercise both sides of that 10-item cliff (9/10/11 elements).
    - actions:
        - "principal-exists"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: P.attr.teams.exists(t, R.attr.aString == t)

    - actions:
        - "principal-all"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: P.attr.teams.all(t, R.attr.aString != t)

    - actions:
        - "filter"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.filter(tag, tag.name == "public")

    - actions:
        - "kitchensink"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          all:
            of:
              - expr: R.attr.tags.filter(tag, tag.name == "public")
              - any:
                  of:
                    - expr: request.resource.attr.aOptionalString != null
                    - expr: request.resource.attr.aBool == true
                    - expr: R.attr.tags.exists(tag, tag.id == "tag1" && tag.name == "public")
                    - expr: request.resource.attr.nested.aNumber > 1
                    - expr: request.resource.attr.aString.endsWith("ing")
                    - expr: request.resource.attr.aString.startsWith("ing")
                    - expr: request.resource.attr.aString.contains("ing")
              - all:
                  of:
                    - expr: hasIntersection(request.resource.attr.tags.map(t, t.name), request.principal.attr.tags)
                    - expr: >
                        "public" in request.principal.attr.tags
                    - expr: request.resource.attr.nested.nextlevel.aBool == true

    - actions:
        - "deep-nested-category-label"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.categories.exists(cat, cat.subCategories.exists(sub, sub.labels.exists(label, label.name == "important")))

    - actions:
        - "deep-nested-exists"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.categories.exists(cat, cat.name == "business" && cat.subCategories.exists(sub, sub.name == "finance"))

    - actions:
        - "map-collection"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(request.resource.attr.tags.map(tag, tag.name), ["public", "private"])

    - actions:
        - "nested-contains"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aString.contains("str")

    - actions:
        - "deeply-nested-starts-with"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.nextlevel.aString.startsWith("str")

    - actions:
        - "exists-nested-collection"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.categories.exists(cat, cat.name == "business" && cat.subCategories.exists(sub, sub.name == "finance"))

    - actions:
        - "is-set-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.nested.aOptionalString != null

    - actions:
        - "has-intersection-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(request.resource.attr.categories.subCategories.map(sub, sub.name), ["finance", "tech"])

    - actions:
        - "filter-deeply-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.categories.exists(cat, cat.subCategories.exists(sub, sub.labels.exists(label, label.name == "important")))

    - actions:
        - "map-deeply-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(request.resource.attr.categories.subCategories.map(sub, sub.name), ["finance", "tech"])

    - actions:
        - "combined-and"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          all:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: request.resource.attr.nested.aString.contains("test")

    - actions:
        - "combined-or"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: request.resource.attr.nested.nextlevel.aBool == true
              - expr: request.resource.attr.categories.exists(cat, cat.name == "business")

    - actions:
        - "relation-has-members"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: size(request.resource.attr.ownedBy) > 0

    - actions:
        - "relation-has-no-members"
      effect: EFFECT_DENY
      roles:
        - USER
      condition:
        match:
          expr: size(request.resource.attr.ownedBy) > 0

    - actions:
        - "relation-has-no-members"
      effect: EFFECT_ALLOW
      roles:
        - USER

    - actions:
        - "combined-not"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.categories.exists(cat, cat.subCategories.exists(sub, sub.name == "finance")))

    - actions:
        - "string-concat"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            request.resource.attr.aString == "prefix:" + request.resource.attr.id

    - actions:
        - "string-concat-principal"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: P.attr.context == "projects"
              - expr: P.attr.context == "projects:" + request.resource.attr.id

    - actions:
        - "not-and"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.aBool == true && request.resource.attr.aString != "string")

    - actions:
        - "not-or"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.aBool == true || request.resource.attr.aString != "string")

    - actions:
        - "not-gt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.aNumber > 1)

    - actions:
        - "not-lt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            !(request.resource.attr.aNumber < 2)

    - actions:
        - "not-contains"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "!request.resource.attr.aString.contains(\"str\")"

    - actions:
        - "not-starts-with"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "!request.resource.attr.aString.startsWith(\"str\")"

    - actions:
        - "arith-add"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber + 1.0 > 2.0

    - actions:
        - "arith-sub"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber - 1.0 < 2.0

    - actions:
        - "arith-mult"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber * 2.0 > 2.0

    - actions:
        - "arith-div"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber / 2.0 > 0.0

    - actions:
        - "arith-mod"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "int(request.resource.attr.aNumber) % 2 == 0"

    - actions:
        - "matches-regex"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString.matches("^str.*")

    - actions:
        - "index-list"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.ownedBy[0] == "user1"

    - actions:
        - "convert-string"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: string(request.resource.attr.aNumber) == "1"

    - actions:
        - "convert-double"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: double(request.resource.attr.aNumber) > 1.5

    - actions:
        - "convert-int"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: int(request.resource.attr.aString) > 0

    - actions:
        - "ternary"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: "(request.resource.attr.aBool ? request.resource.attr.aNumber : 0) > 0"

    - actions:
        - "string-size"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: size(request.resource.attr.aString) > 0

    - actions:
        - "empty-collection"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: size(request.resource.attr.tags) == 0

    - actions:
        - "is-not-set"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aOptionalString == null

    - actions:
        - "equal-field-to-field"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString == request.resource.attr.id

    - actions:
        - "not-equal-field-to-field"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aString != request.resource.attr.id

    - actions:
        - "size-count-threshold"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: size(request.resource.attr.ownedBy) >= 2

    - actions:
        - "equal-bool-false"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aBool == false

    - actions:
        - "in-number"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: request.resource.attr.aNumber in [1, 2, 3]

    - actions:
        - "or-leaf-exists"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          any:
            of:
              - expr: request.resource.attr.aBool == true
              - expr: R.attr.tags.exists(t, t.name == "public")

    - actions:
        - "all-nested"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.all(tag, tag.name == "public" && tag.id != "tag1")

    - actions:
        - "map-compared"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.map(t, t.id) == ["tag1", "tag2"]

    - actions:
        - "filter-count-gt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: size(R.attr.tags.filter(t, t.name == "public")) > 0

    - actions:
        - "hierarchy-overlaps"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            hierarchy(P.attr.context, ":").overlaps(hierarchy(["projects", R.id]))

    - actions:
        - "hierarchy-ancestor-of"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            hierarchy(P.attr.scope).ancestorOf(hierarchy(R.attr.scope))

    - actions:
        - "hierarchy-descendent-of"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: >
            hierarchy(R.attr.scope).descendentOf(hierarchy(P.attr.scope))

    # Operand-order conformance: the planner preserves policy source order, so these
    # value-first shapes reach adapters with the constant as the FIRST operand. Directional
    # operators must be mirrored by adapters or results are silently inverted.
    - actions:
        - "value-first-lt"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: 1 < R.attr.aNumber

    - actions:
        - "value-first-size"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: 0 < size(R.attr.ownedBy)

    - actions:
        - "value-first-intersect"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: hasIntersection(["user1", "userX"], R.attr.ownedBy)

    # A residual resource attribute INSIDE a collection lambda body — adapters must resolve
    # it against the outer entity, not the collection element.
    - actions:
        - "outer-attr-in-lambda"
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: R.attr.tags.exists(tag, tag.name == "public" && R.attr.aBool)


